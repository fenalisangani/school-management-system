{% if page_obj.paginator.num_pages > 1 %}
<nav class="pagination" aria-label="Pagination">
    {% if page_obj.has_previous %}
        <a href="?{% if query %}q={{ query|urlencode }}&amp;{% endif %}page={{ page_obj.previous_page_number }}">‹ Prev</a>
    {% endif %}
    <span class="current">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
        <a href="?{% if query %}q={{ query|urlencode }}&amp;{% endif %}page={{ page_obj.next_page_number }}">Next ›</a>
    {% endif %}
    <span class="muted text-muted">· {{ page_obj.paginator.count }} total</span>
</nav>
{% endif %}
